[numerics]
method = "seeded_euler_maruyama_endpoint_absorption"
time_step_s = 1.0e-5
steps = 2000
snapshot_interval_steps = 200

[benchmarks]
first_passage_sample_count = 40000
refinement_sample_count = 30000
max_abs_standardized_residual = 4.0
refinement_step_counts = [4, 16, 64, 256]
halfline_initial_distance_m = 5.0e-6
halfline_final_time_s = 0.004
observation_times_s = [0.0005, 0.001, 0.002, 0.004, 0.008, 0.016]

[acceptance]
max_nonfinite_particles = 0
max_reverse_barrier_identity_error_ev = 1.0e-12
require_refinement_error_reduction = true

[output]
root = "runs"
dashboard_data_schema = "dashboard-data-v1"
