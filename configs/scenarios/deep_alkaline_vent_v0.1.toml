schema_version = "0.1"
kind = "research_scenario"

[scenario]
id = "deep_alkaline_komatiite_vent_v0.1"
version = "0.1.0"
title = "Late-Hadean komatiite source to alkaline porous mixing zone"
status = "proposed"
research_ready = false
selection_record = "docs/22-setting-selection.md"
model_card = "docs/models/alkaline-vent-environment-v0.1.md"
primary_domain = "connected fracture and chimney-wall pore-network segment"
challenger = "shallow hydrothermal and fluctuating-surface scenario"
open_parameters = [
  "ambient and source major-ion composition",
  "salinity and aqueous activity model",
  "water depth and circulation depth",
  "permeability, tortuosity, reactive area, and pore-size joint distribution",
  "natural catalyst abundance and formation history",
  "source and exterior flux histories",
]

[[sources]]
id = "wilde2001"
