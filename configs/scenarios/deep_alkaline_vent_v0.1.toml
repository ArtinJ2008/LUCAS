[[validation_targets]]
id = "ueda_komatiite_hydrogen_points"
source_ids = ["ueda2021"]
target_type = "discrete_component_measurements"
quantities = ["dissolved_H2", "dissolved_H2", "dissolved_H2_context"]
values = [1.3e-5, 5.7e-4, 2.3e-2]
units = ["mol kg^-1", "mol kg^-1", "mol kg^-1"]
conditions = [
  "373.15 K, 50 MPa, CO2-rich synthetic-komatiite experiment",
  "573.15 K, 50 MPa, CO2-rich synthetic-komatiite experiment",
  "573.15 K, 50 MPa, cited CO2-free comparison experiment",
]
role = "water-rock component validation; never an inlet prior"
limitation = "the third point belongs to a different CO2 condition and earlier experiment"

[[validation_targets]]
id = "weingart_precipitation_gradient"
source_ids = ["weingart2023"]
target_type = "coupled_microfluidic_dataset"
quantities = ["precipitate_morphology", "pH_gradient_presence", "particle_accumulation"]
values = []
units = []
conditions = ["quasi-2D alkaline injection into acidic iron-containing solution"]
role = "geometry, precipitation, and gradient validation"
limitation = "apparatus chemistry and dimensionality differ from a natural vent"

